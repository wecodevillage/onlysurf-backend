services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - 4000:4000
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for specific Neon branch if needed
      # DATABASE_URL: ${NEON_BRANCH_URL}
      NODE_ENV: development
    command: ash /app/scripts/start-reload.sh
    networks:
      - onlysurf

networks:
  onlysurf:
    driver: bridge
    external: false
